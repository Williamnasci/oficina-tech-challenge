name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  LOCAL_IMAGE_NAME: oficina-tech-challenge
  DOCKERHUB_IMAGE_NAME: oficina-tech-challenge

jobs:
  quality:
    name: Build and tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oficina_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oficina_db?schema=public
      JWT_SECRET: test-secret
      JWT_EXPIRES_IN: 1d
      AUTH_DEMO_USERNAME: admin
      AUTH_DEMO_PASSWORD: admin

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Build application
        run: npm run build

      - name: Run automated tests
        run: npm test -- --runInBand

  docker:
    name: Docker build and push
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: docker build -t ${{ env.LOCAL_IMAGE_NAME }}:${{ github.sha }} .

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          docker tag ${{ env.LOCAL_IMAGE_NAME }}:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_IMAGE_NAME }}:latest
          docker tag ${{ env.LOCAL_IMAGE_NAME }}:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_IMAGE_NAME }}:${{ github.sha }}

      - name: Push Docker image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_IMAGE_NAME }}:${{ github.sha }}

  security:
    name: Trivy security scan
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build image for scan
        run: docker build -t ${{ env.LOCAL_IMAGE_NAME }}:security-scan .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_IMAGE_NAME }}:security-scan
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Scan filesystem with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

  kubernetes-validate:
    name: Kubernetes manifests validation
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Render Kubernetes manifests
        run: kubectl kustomize k8s

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [docker, kubernetes-validate]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Deploy to Kubernetes
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "--------------------------------------------------------"
            echo "Aviso: KUBE_CONFIG não está definido nos segredos do GitHub."
            echo "O deploy real no cluster Kubernetes foi ignorado com sucesso."
            echo "Configure o segredo KUBE_CONFIG se desejar deploy real em produção."
            echo "--------------------------------------------------------"
            exit 0
          fi

          echo "Configurando credenciais do Kubernetes..."
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" > ~/.kube/config
          chmod 600 ~/.kube/config

          # Define o username do Docker Hub padrão ou o do segredo
          USERNAME="$DOCKERHUB_USERNAME"
          if [ -z "$USERNAME" ]; then
            USERNAME="williamnasci"
          fi

          echo "Atualizando tags de imagens temporariamente no runner para o Kustomize..."
          # NOTA: kustomize edit altera o arquivo kustomization.yaml temporariamente no runner
          # durante a execução da pipeline. Esta alteração NÃO é commitada no repositório.
          # Atualiza tanto a imagem do container principal quanto do initContainer prisma-migrate.
          cd k8s
          kustomize edit set image williamnasci/oficina-tech-challenge=$USERNAME/${{ env.DOCKERHUB_IMAGE_NAME }}:${{ github.sha }}
          cd ..

          echo "Aplicando manifestos no cluster Kubernetes..."
          kubectl apply -k k8s

          echo "Aguardando o rollout da API Oficina..."
          kubectl rollout status deployment/oficina-api -n oficina --timeout=180s

