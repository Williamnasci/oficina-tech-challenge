apiVersion: v1
kind: Secret
metadata:
  name: oficina-secrets
  namespace: oficina
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: supersecretpassword
  POSTGRES_DB: oficina_db
  JWT_SECRET: supersecretkey
  AUTH_DEMO_PASSWORD: admin
  STATUS_NOTIFICATION_WEBHOOK_URL: ""
  DATABASE_URL: postgresql://postgres:supersecretpassword@postgres:5432/oficina_db?schema=public
