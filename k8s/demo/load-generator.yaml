apiVersion: apps/v1
kind: Deployment
metadata:
  name: oficina-load-generator
  namespace: oficina
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oficina-load-generator
  template:
    metadata:
      labels:
        app: oficina-load-generator
    spec:
      containers:
        - name: load-generator
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - while true; do wget -q -O- http://oficina-api/health >/dev/null; done
          resources:
            requests:
              cpu: 10m
              memory: 8Mi
            limits:
              cpu: 100m
              memory: 32Mi
